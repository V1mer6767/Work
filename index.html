<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#0c1210"/>
  <title>Трекер робочих годин</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0c1210;
      --surface:#121a17;
      --surface2:#182220;
      --surface3:#1f2b27;
      --border:#26332f;
      --border2:#32423c;
      --text:#eef3f0;
      --muted:#84948d;
      --muted2:#586159;
      --accent:#e8b34c;
      --accent-dim:rgba(232,179,76,.09);
      --accent-dim2:rgba(232,179,76,.17);
      --danger:#ff6b5e;
      --danger-dim:rgba(255,107,94,.1);
      --success:#5fd39a;
      --display:'Space Grotesk',sans-serif;
      --r:10px;
      --r2:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      font-size:14px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    .mono{font-family:'DM Mono',monospace;}
    .app{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
    .header{margin-bottom:32px;}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
    .brand h1{font-family:var(--display);font-size:23px;font-weight:600;letter-spacing:-.3px;color:var(--text);}
    .brand p{font-size:12px;color:var(--muted);margin-top:2px;}
    .week-nav{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
    .week-nav button{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;transition:color .15s,background .15s;}
    .week-nav button:hover{color:var(--text);background:var(--surface3);}
    .week-nav .week-label{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border);min-width:130px;text-align:center;white-space:nowrap;}
    .week-nav .btn-today{background:none;border:none;color:var(--accent);cursor:pointer;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:background .15s;}
    .week-nav .btn-today:hover{background:var(--accent-dim);}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
    @media(max-width:480px){.stats{grid-template-columns:1fr;}}
    .flip-card{position:relative;background:linear-gradient(135deg,var(--surface2),var(--surface));border:1.5px dashed var(--border2);border-radius:var(--r2);padding:16px 16px 14px;cursor:pointer;user-select:none;transition:transform .12s,border-color .15s;-webkit-tap-highlight-color:transparent;}
    .flip-card:hover{border-color:var(--muted2);}
    .flip-card:active{transform:scale(.97);}
    .flip-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .flip-card-top label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
    .flip-dots{display:flex;gap:4px;}
    .flip-dots .dot{width:13px;height:4px;border-radius:2px;background:var(--border2);transition:background .2s;}
    .flip-dots .dot.active{background:var(--accent);}
    .flip-card strong{font-family:'DM Mono',monospace;font-size:24px;font-weight:600;color:var(--text);display:block;line-height:1;}
    .flip-card.money strong{color:var(--accent);}
    .flip-card small{font-size:11px;color:var(--muted2);margin-top:5px;display:block;}
    .main{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;}
    @media(max-width:760px){.main{grid-template-columns:1fr;}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 1px 0 rgba(0,0,0,.15);}
    .card-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .card-head h2{font-family:var(--display);font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.1px;}
    .card-body{padding:18px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    @media(max-width:480px){.form-grid{grid-template-columns:1fr;}}
    .field label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.2px;}
    .field input,.field select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;}
    .field input:focus,.field select:focus{border-color:rgba(232,179,76,.45);box-shadow:0 0 0 3px rgba(232,179,76,.08);}
    .field select option{background:#1e1e1e;}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px;}
    .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r);padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
    .btn-primary{background:var(--accent);color:#16130a;}
    .btn-primary:hover{background:#f2c470;}
    .btn-primary:active{transform:scale(.98);}
    .btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
    .btn-ghost:hover{color:var(--text);background:var(--surface3);}
    .btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(255,68,68,.2);}
    .btn-danger:hover{background:rgba(255,68,68,.18);}
    .table-wrap{overflow-x:auto;margin-top:16px;}
    table{width:100%;border-collapse:collapse;}
    th{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
    td{padding:10px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--surface2);}
    .icon-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:5px 8px;font-size:12px;transition:all .15s;}
    .icon-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3);}
    .icon-btn.del:hover{color:var(--danger);border-color:rgba(255,68,68,.3);}
    .empty-row{color:var(--muted);padding:28px;text-align:center;font-size:13px;}
    .summary-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .summary-item:last-child{border-bottom:none;}
    .summary-item span{color:var(--muted);}
    .summary-item strong{font-family:'DM Mono',monospace;color:var(--text);}
    .summary-item.total span{color:var(--text);}
    .summary-item.total strong{color:var(--accent);font-size:16px;}
    .history-week{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
    .history-week:hover{border-color:var(--border2);}
    .history-week-top{display:flex;justify-content:space-between;align-items:center;}
    .history-week-label{font-size:13px;font-weight:500;}
    .history-week-money{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);}
    .history-week-detail{font-size:11px;color:var(--muted);margin-top:3px;}
    .alltime{position:relative;background:var(--accent-dim);border:1px solid rgba(232,179,76,.22);border-radius:var(--r2);padding:18px 16px 16px;margin-bottom:14px;overflow:hidden;}
    .alltime::before{content:"";position:absolute;left:0;right:0;bottom:38px;height:0;border-top:1.5px dashed rgba(232,179,76,.3);}
    .alltime::after{content:"";position:absolute;left:-8px;right:-8px;bottom:32px;height:12px;background:radial-gradient(circle 6px,var(--bg) 6px,transparent 6.5px);background-size:16px 12px;background-repeat:repeat-x;background-position:0 0;}
    .alltime label{font-size:11px;color:rgba(232,179,76,.75);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
    .alltime-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
    .alltime strong{font-family:'DM Mono',monospace;font-size:27px;font-weight:600;color:var(--accent);}
    .alltime small{font-size:12px;color:rgba(232,179,76,.65);}
    .alltime-stub{margin-top:16px;padding-top:10px;font-size:11px;color:var(--muted2);letter-spacing:.3px;display:flex;justify-content:space-between;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-bg.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:340px;max-width:90vw;transform:translateY(8px);transition:transform .2s;}
    .modal-bg.open .modal{transform:translateY(0);}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:18px;}
    .modal .field{margin-bottom:12px;}
    .modal-btns{display:flex;gap:8px;margin-top:20px;}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(8px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:all .18s;z-index:200;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .tabs{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px;}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .tab:not(:last-child){border-right:1px solid var(--border);}
    .tab.active{background:var(--surface3);color:var(--text);}
    .tab:hover:not(.active){color:var(--text);}
    .job-badge{display:flex;align-items:center;gap:6px;}
    .job-dot{width:6px;height:6px;border-radius:50%;}
    .section-hidden{display:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <h1>Трекер робочих годин</h1>
        <p id="jobsSubtitle">завантаження...</p>
      </div>
      <div class="week-nav">
        <button onclick="shiftWeek(-7)">← Пред</button>
        <div class="week-label" id="weekLabel">...</div>
        <button onclick="shiftWeek(7)">Наст →</button>
        <button class="btn-today" onclick="goToday()">Сьогодні</button>
      </div>
    </div>
    <div class="stats">
      <div class="flip-card money" id="hoursCard" onclick="toggleHoursView()">
        <div class="flip-card-top">
          <label id="hoursCardLabel">Години • тиждень</label>
          <span class="flip-dots"><span class="dot" id="hoursDot0"></span><span class="dot" id="hoursDot1"></span></span>
        </div>
        <strong id="kpiHoursCard" class="mono">0.00</strong>
        <small id="hoursCardSub">торкніться для «весь час»</small>
      </div>
      <div class="flip-card money" id="moneyCard" onclick="toggleMoneyView()">
        <div class="flip-card-top">
          <label id="moneyCardLabel">Заробіток • тиждень</label>
          <span class="flip-dots"><span class="dot" id="moneyDot0"></span><span class="dot" id="moneyDot1"></span></span>
        </div>
        <strong id="kpiMoneyCard">0.00 €</strong>
        <small id="moneyCardSub">торкніться для «весь час»</small>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('week',this)">Цей тиждень</button>
    <button class="tab" onclick="switchTab('history',this)">Вся історія</button>
  </div>

  <div id="tab-week">
    <div class="main">
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-head"><h2>Додати запис</h2></div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field"><label>Дата</label><input type="date" id="dateInput"></div>
              <div class="field"><label>Робота</label><select id="jobSelect"></select></div>
              <div class="field"><label>Години (напр. 6.5)</label><input type="number" id="hoursInput" inputmode="decimal" step="0.25" min="0" placeholder="0.00"></div>
              <div class="field"><label>Примітка</label><input type="text" id="noteInput" placeholder="необов'язково"></div>
            </div>
            <div class="btn-row">
              <button class="btn btn-primary" onclick="addEntry()">+ Додати</button>
              <button class="btn btn-ghost" onclick="exportJson()">Експорт JSON</button>
              <button class="btn btn-danger" onclick="clearWeek()">Очистити тиждень</button>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><h2>Записи тижня</h2></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Дата</th><th>Робота</th><th>Год</th><th>€</th><th>Примітка</th><th></th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px;">
          <div class="card-head">
            <h2>Підсумок тижня</h2>
            <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="openRates()">⚙ Ставки</button>
          </div>
          <div class="card-body" id="weekSummary"></div>
        </div>
        <div class="card">
          <div class="card-head"><h2>Нещодавні тижні</h2></div>
          <div class="card-body" id="recentWeeks" style="padding:12px 14px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-history" class="section-hidden">
    <div class="alltime" id="allTimeCard" onclick="toggleHistView()" style="cursor:pointer;">
      <div class="flip-card-top" style="margin-bottom:6px;">
        <label id="histLabel" style="margin-bottom:0;">Всього зароблено за весь час</label>
        <span class="flip-dots"><span class="dot" id="histDot0"></span><span class="dot" id="histDot1"></span></span>
      </div>
      <div class="alltime-row">
        <strong id="histMain">0.00 €</strong>
        <small id="histSub">0.00 год</small>
      </div>
      <div class="alltime-stub"><span id="histStubHint">торкніться для годин</span><span id="histWeekCountStub">—</span></div>
    </div>
    <div class="card">
      <div class="card-head">
        <h2>Всі тижні</h2>
        <span id="histWeekCount" style="font-size:12px;color:var(--muted);">...</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Тиждень</th><th>Годин</th><th>Заробіток</th><th>Записів</th></tr></thead>
          <tbody id="histRows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeRatesIfOutside(event)">
  <div class="modal">
    <h3>Ставки та роботи</h3>
    <div id="ratesFields"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-ghost" style="font-size:12px;" onclick="addJob()">+ Додати роботу</button>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveRates()">Зберегти</button>
      <button class="btn btn-ghost" onclick="closeRates()">Скасувати</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ENTRIES_KEY="wh_entries_v2";
const RATES_KEY="wh_rates_v2";
const VIEW_H_KEY="wh_view_hours";
const VIEW_M_KEY="wh_view_money";
const VIEW_HIST_KEY="wh_view_hist";
const JOB_COLORS=["#7aacff","#ffb83c","#64dca0","#d464ff","#ff6464","#47e8ff"];
const defaultJobs=[{id:"job1",name:"Робота 1",rate:5.0},{id:"job2",name:"Робота 2",rate:1.5}];
let hoursView=localStorage.getItem(VIEW_H_KEY)==="all"?"all":"week";
let moneyView=localStorage.getItem(VIEW_M_KEY)==="all"?"all":"week";
let histView=localStorage.getItem(VIEW_HIST_KEY)==="hours"?"hours":"money";
let jobs=loadJobs();
(function migrateRate(){
  const FLAG="wh_rate_migrated_v3to5";
  if(localStorage.getItem(FLAG))return;
  const j1=jobs.find(j=>j.id==="job1");
  if(j1&&j1.rate===3.0){j1.rate=5.0;localStorage.setItem(RATES_KEY,JSON.stringify(jobs));}
  localStorage.setItem(FLAG,"1");
})();
let entries=loadEntries();
let weekAnchor=stripTime(new Date());
document.getElementById("dateInput").value=toISO(new Date());
renderAll();

function switchTab(tab,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-week").classList.toggle("section-hidden",tab!=="week");
  document.getElementById("tab-history").classList.toggle("section-hidden",tab!=="history");
  if(tab==="history")renderHistory();
}
function goToday(){weekAnchor=stripTime(new Date());document.getElementById("dateInput").value=toISO(new Date());renderAll();toast("Поточний тиждень ✓");}
function shiftWeek(d){weekAnchor=addDays(weekAnchor,d);renderAll();}

function addEntry(){
  const date=document.getElementById("dateInput").value.trim();
  const jobId=document.getElementById("jobSelect").value;
  const hours=parseNum(document.getElementById("hoursInput").value);
  const note=document.getElementById("noteInput").value.trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date))return toast("Вибери дату !");
  if(!isFinite(hours)||hours<=0)return toast("Вкажи години > 0");
  entries.push({id:uid(),date,jobId,hours:r2(hours),note});
  saveEntries();
  document.getElementById("hoursInput").value="";
  document.getElementById("noteInput").value="";
  renderAll();toast("Додано ✓");
}
function deleteEntry(id){entries=entries.filter(e=>e.id!==id);saveEntries();renderAll();toast("Видалено");}
function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const h=prompt("Нові години:",e.hours);if(h===null)return;
  const n=parseNum(h);if(!isFinite(n)||n<=0)return toast("Некоректне значення");
  const note=prompt("Примітка:",e.note||"");if(note===null)return;
  e.hours=r2(n);e.note=note.trim();saveEntries();renderAll();toast("Оновлено ✓");
}
function clearWeek(){
  if(!confirm("Видалити всі записи цього тижня?"))return;
  const{start,end}=weekRange(weekAnchor);
  const before=entries.length;
  entries=entries.filter(e=>{const d=new Date(e.date+"T00:00:00");return!(d>=start&&d<=end);});
  saveEntries();renderAll();toast(before===entries.length?"Немає записів":"Тиждень очищено");
}
function exportJson(){
  const blob=new Blob([JSON.stringify({jobs,entries},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="work-hours.json";a.click();toast("Експорт готовий");
}

function renderAll(){
  buildJobSelect();updateSubtitle();
  const{start,end}=weekRange(weekAnchor);
  document.getElementById("weekLabel").textContent=weekLabel(start,end);
  const wEntries=entries.map(e=>({...e,dObj:new Date(e.date+"T00:00:00")})).filter(e=>e.dObj>=start&&e.dObj<=end).sort((a,b)=>a.dObj-b.dObj);
  renderTable(wEntries);renderWeekSummary(wEntries);renderTopStats(wEntries);renderRecentWeeks();
}
function buildJobSelect(){
  const sel=document.getElementById("jobSelect");const prev=sel.value;sel.innerHTML="";
  jobs.forEach(j=>{const opt=document.createElement("option");opt.value=j.id;opt.textContent=`${j.name} (${fmt(j.rate)} €/год)`;sel.appendChild(opt);});
  if(prev&&jobs.find(j=>j.id===prev))sel.value=prev;
}
function updateSubtitle(){document.getElementById("jobsSubtitle").textContent=jobs.map(j=>`${j.name}: ${fmt(j.rate)} €/год`).join(" • ");}

function renderTable(list){
  const tbody=document.getElementById("rows");
  if(!list.length){tbody.innerHTML=`<tr><td colspan="6" class="empty-row">Немає записів за цей тиждень</td></tr>`;return;}
  tbody.innerHTML=list.map(e=>{
    const job=jobs.find(j=>j.id===e.jobId)||{name:e.jobId,rate:0};
    const idx=jobs.indexOf(job);
    const color=JOB_COLORS[idx%JOB_COLORS.length];
    const money=r2(e.hours*job.rate);
    return`<tr>
      <td class="mono">${fmtDate(e.dObj)}</td>
      <td><div class="job-badge"><span class="job-dot" style="background:${color}"></span><span>${esc(job.name)}</span></div></td>
      <td class="mono">${fmt(e.hours)}</td>
      <td class="mono" style="color:var(--accent)">${fmt(money)} €</td>
      <td style="color:var(--muted);font-size:12px;">${esc(e.note||"")}</td>
      <td><span style="display:flex;gap:4px;"><button class="icon-btn" onclick="editEntry('${e.id}')">✎</button><button class="icon-btn del" onclick="deleteEntry('${e.id}')">✕</button></span></td>
    </tr>`;
  }).join("");
}
function renderWeekSummary(list){
  const el=document.getElementById("weekSummary");
  let rows="";let totalH=0,totalM=0;
  jobs.forEach((job,idx)=>{
    const h=r2(list.filter(e=>e.jobId===job.id).reduce((s,e)=>s+e.hours,0));
    const m=r2(h*job.rate);totalH+=h;totalM+=m;
    const color=JOB_COLORS[idx%JOB_COLORS.length];
    if(h>0)rows+=`<div class="summary-item"><span><span class="job-dot" style="background:${color};display:inline-block;margin-right:6px;"></span>${esc(job.name)}</span><span style="display:flex;gap:18px;"><span class="mono" style="color:var(--muted)">${fmt(h)} год</span><strong class="mono">${fmt(m)} €</strong></span></div>`;
  });
  if(!rows)rows=`<div style="color:var(--muted);font-size:13px;padding:8px 0;">Немає записів</div>`;
  el.innerHTML=rows+`<div class="summary-item total" style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);"><span style="font-weight:600;">Разом</span><span style="display:flex;gap:18px;"><span class="mono" style="color:var(--muted)">${fmt(r2(totalH))} год</span><strong class="mono">${fmt(r2(totalM))} €</strong></span></div>`;
}
function renderTopStats(weekEntries){
  const wH=r2(weekEntries.reduce((s,e)=>s+e.hours,0));
  const wM=r2(weekEntries.reduce((s,e)=>{const j=jobs.find(j=>j.id===e.jobId);return s+e.hours*(j?j.rate:0);},0));
  const aH=r2(entries.reduce((s,e)=>s+e.hours,0));
  const aM=r2(entries.reduce((s,e)=>{const j=jobs.find(j=>j.id===e.jobId);return s+e.hours*(j?j.rate:0);},0));
  document.getElementById("kpiHoursCard").textContent=fmt(hoursView==="week"?wH:aH);
  document.getElementById("hoursCardLabel").textContent=hoursView==="week"?"Години • тиждень":"Години • весь час";
  document.getElementById("hoursCardSub").textContent=hoursView==="week"?"торкніться для «весь час»":"торкніться для «цей тиждень»";
  document.getElementById("hoursDot0").classList.toggle("active",hoursView==="week");
  document.getElementById("hoursDot1").classList.toggle("active",hoursView==="all");
  document.getElementById("kpiMoneyCard").textContent=fmt(moneyView==="week"?wM:aM)+" €";
  document.getElementById("moneyCardLabel").textContent=moneyView==="week"?"Заробіток • тиждень":"Заробіток • весь час";
  document.getElementById("moneyCardSub").textContent=moneyView==="week"?"торкніться для «весь час»":"торкніться для «цей тиждень»";
  document.getElementById("moneyDot0").classList.toggle("active",moneyView==="week");
  document.getElementById("moneyDot1").classList.toggle("active",moneyView==="all");
}
function toggleHoursView(){hoursView=hoursView==="week"?"all":"week";localStorage.setItem(VIEW_H_KEY,hoursView);renderAll();}
function toggleMoneyView(){moneyView=moneyView==="week"?"all":"week";localStorage.setItem(VIEW_M_KEY,moneyView);renderAll();}
function renderRecentWeeks(){
  const el=document.getElementById("recentWeeks");const weeks=getWeeksSummary();
  if(!weeks.length){el.innerHTML=`<div style="color:var(--muted);font-size:13px;">Немає даних</div>`;return;}
  el.innerHTML=weeks.slice(0,6).map(w=>`<div class="history-week" onclick="jumpToWeek('${toISO(w.start)}')"><div class="history-week-top"><span class="history-week-label">${weekLabel(w.start,w.end)}</span><span class="history-week-money">${fmt(w.money)} €</span></div><div class="history-week-detail">${fmt(w.hours)} год · ${w.count} запис(ів)</div></div>`).join("");
}
function renderHistory(){
  const weeks=getWeeksSummary();
  const aH=r2(entries.reduce((s,e)=>s+e.hours,0));
  const aM=r2(entries.reduce((s,e)=>{const j=jobs.find(j=>j.id===e.jobId);return s+e.hours*(j?j.rate:0);},0));
  if(histView==="money"){
    document.getElementById("histLabel").textContent="Всього зароблено за весь час";
    document.getElementById("histMain").textContent=fmt(aM)+" €";
    document.getElementById("histSub").textContent=fmt(aH)+" год";
    document.getElementById("histStubHint").textContent="торкніться для годин";
  }else{
    document.getElementById("histLabel").textContent="Всього відпрацьовано годин";
    document.getElementById("histMain").textContent=fmt(aH)+" год";
    document.getElementById("histSub").textContent=fmt(aM)+" €";
    document.getElementById("histStubHint").textContent="торкніться для заробітку";
  }
  document.getElementById("histDot0").classList.toggle("active",histView==="money");
  document.getElementById("histDot1").classList.toggle("active",histView==="hours");
  document.getElementById("histWeekCount").textContent=`${weeks.length} тижнів`;
  document.getElementById("histWeekCountStub").textContent=`${weeks.length} тижнів у роботі`;
  const tbody=document.getElementById("histRows");
  if(!weeks.length){tbody.innerHTML=`<tr><td colspan="4" class="empty-row">Немає даних</td></tr>`;return;}
  tbody.innerHTML=weeks.map(w=>`<tr><td style="cursor:pointer;color:var(--accent);" onclick="jumpToWeekAndTab('${toISO(w.start)}')">${weekLabel(w.start,w.end)}</td><td class="mono">${fmt(w.hours)}</td><td class="mono" style="color:var(--accent)">${fmt(w.money)} €</td><td>${w.count}</td></tr>`).join("");
}
function toggleHistView(){histView=histView==="money"?"hours":"money";localStorage.setItem(VIEW_HIST_KEY,histView);renderHistory();}
function jumpToWeek(isoDate){weekAnchor=new Date(isoDate+"T00:00:00");renderAll();document.querySelectorAll(".tab")[0].click();}
function jumpToWeekAndTab(isoDate){weekAnchor=new Date(isoDate+"T00:00:00");renderAll();document.querySelectorAll(".tab")[0].click();}

function getWeeksSummary(){
  if(!entries.length)return[];
  const map={};
  entries.forEach(e=>{
    const d=new Date(e.date+"T00:00:00");const{start}=weekRange(d);const key=toISO(start);
    if(!map[key])map[key]={start,end:addDays(start,6),hours:0,money:0,count:0};
    const job=jobs.find(j=>j.id===e.jobId);
    map[key].hours=r2(map[key].hours+e.hours);
    map[key].money=r2(map[key].money+e.hours*(job?job.rate:0));
    map[key].count++;
  });
  return Object.values(map).sort((a,b)=>b.start-a.start);
}

let draftJobs=[];
function openRates(){draftJobs=jobs.map(j=>({...j}));renderRatesFields();document.getElementById("modalBg").classList.add("open");}
function closeRates(){document.getElementById("modalBg").classList.remove("open");}
function closeRatesIfOutside(e){if(e.target===document.getElementById("modalBg"))closeRates();}
function renderRatesFields(){
  document.getElementById("ratesFields").innerHTML=draftJobs.map((j,i)=>`
    <div class="field" style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-bottom:10px;">
      <div><label>Назва роботи ${i+1}</label><input type="text" value="${esc(j.name)}" oninput="draftJobs[${i}].name=this.value"></div>
      <div style="width:90px;"><label>€/год</label><input type="number" step="0.01" min="0" value="${j.rate}" oninput="draftJobs[${i}].rate=parseFloat(this.value)||0"></div>
      ${draftJobs.length>1?`<button class="btn btn-danger" style="padding:9px 10px;align-self:end;" onclick="removeJob(${i})">✕</button>`:'<div></div>'}
    </div>`).join("");
}
function addJob(){draftJobs.push({id:"job"+Date.now(),name:"Робота "+(draftJobs.length+1),rate:2.0});renderRatesFields();}
function removeJob(i){draftJobs.splice(i,1);renderRatesFields();}
function saveRates(){
  if(draftJobs.some(j=>!j.name.trim()))return toast("Вкажи назву для кожної роботи");
  jobs=draftJobs.map(j=>({...j,name:j.name.trim(),rate:r2(j.rate)}));
  localStorage.setItem(RATES_KEY,JSON.stringify(jobs));closeRates();renderAll();toast("Ставки оновлено ✓");
}

function loadEntries(){try{const r=localStorage.getItem(ENTRIES_KEY);const p=r?JSON.parse(r):[];return Array.isArray(p)?p:[];}catch{return[];}}
function saveEntries(){localStorage.setItem(ENTRIES_KEY,JSON.stringify(entries));}
function loadJobs(){try{const r=localStorage.getItem(RATES_KEY);const p=r?JSON.parse(r):null;return Array.isArray(p)&&p.length?p:[...defaultJobs];}catch{return[...defaultJobs];}}

function weekRange(anchor){const d=stripTime(new Date(anchor));const day=(d.getDay()+6)%7;const start=addDays(d,-day);return{start,end:addDays(start,6)};}
function weekLabel(s,e){return`${pad(s.getDate())}.${pad(s.getMonth()+1)} – ${pad(e.getDate())}.${pad(e.getMonth()+1)}`;}
function stripTime(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return stripTime(x);}
function toISO(d){const x=stripTime(d);return`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;}
function fmtDate(d){return`${pad(d.getDate())}.${pad(d.getMonth()+1)}`;}
function pad(n){return String(n).padStart(2,"0");}
function parseNum(v){return Number(String(v||"").replace(",",".").trim());}
function r2(n){return Math.round(n*100)/100;}
function fmt(n){return(Math.round(Number(n)*100)/100).toFixed(2);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return Date.now().toString(16)+"-"+Math.random().toString(16).slice(2);}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2000);}
</script>
